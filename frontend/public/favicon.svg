<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="24" fill="#0f172a"/>

  <!-- Flask body - wide base -->
  <path d="M52 42 h24 v20 l18 36 H34 l18-36 z" fill="#3b82f6"/>

  <!-- Flask neck -->
  <rect x="52" y="30" width="24" height="16" rx="3" fill="#60a5fa"/>

  <!-- Flask rim -->
  <rect x="48" y="28" width="32" height="6" rx="3" fill="#93c5fd"/>

  <!-- Rocket nose cone rising from flask -->
  <path d="M64 10 L74 32 H54 Z" fill="#f97316"/>

  <!-- Rocket exhaust glow -->
  <ellipse cx="64" cy="36" rx="6" ry="4" fill="#fbbf24" opacity="0.8"/>

  <!-- Bubbles in flask -->
  <circle cx="54" cy="78" r="5" fill="#93c5fd" opacity="0.7"/>
  <circle cx="70" cy="86" r="3.5" fill="#93c5fd" opacity="0.5"/>
  <circle cx="60" cy="88" r="2.5" fill="#bfdbfe" opacity="0.6"/>
  <circle cx="74" cy="76" r="2" fill="#bfdbfe" opacity="0.5"/>

  <!-- Medical cross -->
  <rect x="84" y="44" width="14" height="4" rx="2" fill="#34d399" opacity="0.9"/>
  <rect x="89" y="39" width="4" height="14" rx="2" fill="#34d399" opacity="0.9"/>
</svg>
